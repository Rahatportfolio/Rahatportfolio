<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Login | Rahat Ahmed</title><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{min-height:100vh;display:grid;place-items:center}.admin-wrap{width:min(520px,92%)}.admin-logo{text-align:center;font-size:2rem;font-weight:900;margin-bottom:22px}.admin-logo span{color:var(--brand)}.admin-card{background:linear-gradient(145deg,#ffffff12,#ffffff05);border:1px solid var(--line);border-radius:22px;padding:28px;box-shadow:0 20px 70px #0006}.admin-card h1{margin-top:0}.message{margin-top:12px;color:var(--brand);min-height:24px}.message.error{color:#ff9999}.table-wrap{overflow:auto}.messages{width:100%;border-collapse:collapse}.messages td,.messages th{padding:10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}.logout{margin-top:20px}</style></head><body><div class="admin-wrap"><div class="admin-logo">Rahat<span>.</span> Admin</div><div class="admin-card" id="loginCard"><h1>Admin Login</h1><p class="muted">শুধু website owner-এর জন্য।</p><form id="loginForm" class="form"><input id="email" type="email" value="rahatbddb@gmail.com" required><input id="password" type="password" placeholder="Password" required><button class="btn" type="submit">Login</button><div id="loginMessage" class="message"></div></form></div><div class="admin-card" id="dashboard" hidden><h1>Messages</h1><div id="messageList" class="table-wrap"></div><button class="btn alt logout" id="logout">Logout</button></div></div><script>const URL='https://shgdnvovfnjwwrhphbvh.supabase.co';const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNoZ2Rudm92Zm5qd3dyaHBoYnZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNTM1ODAsImV4cCI6MjA5OTgyOTU4MH0.rgZCOttTB9wU6EvFPZxjrQWif-eV-hxWxuGDG4lrDvI';const db=window.supabase.createClient(URL,KEY);const $=id=>document.getElementById(id);const esc=s=>String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));async function loadMessages(){const {data,error}=await db.from('messages').select('*').order('created_at',{ascending:false});if(error){$('messageList').innerHTML='<p class="message error">Messages load হয়নি। আগে supabase-schema.sql Run করুন।</p>';return}$('messageList').innerHTML=data.length?'<table class="messages"><tr><th>Name</th><th>Message</th></tr>'+data.map(m=>'<tr><td><b>'+esc(m.name)+'</b><br>'+esc(m.email)+'</td><td>'+esc(m.message)+'<br><small>'+esc(m.subject)+'</small></td></tr>').join('')+'</table>':'<p class="muted">কোনো message নেই।</p>'}async function check(){const {data}=await db.auth.getSession();if(data.session){$('loginCard').hidden=true;$('dashboard').hidden=false;loadMessages()}}$('loginForm').onsubmit=async e=>{e.preventDefault();const b=e.target.querySelector('button');b.disabled=true;b.textContent='Logging in...';const {error}=await db.auth.signInWithPassword({email:$('email').value,password:$('password').value});if(error){$('loginMessage').textContent=error.message;$('loginMessage').className='message error'}else{$('loginMessage').textContent='Login successful';await check()}b.disabled=false;b.textContent='Login'};$('logout').onclick=async()=>{await db.auth.signOut();location.reload()};check();</script></body></html>
