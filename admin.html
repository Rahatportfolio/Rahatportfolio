<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Dashboard | Rahat Ahmed</title><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{min-height:100vh;display:grid;place-items:center}.admin-wrap{width:min(980px,94%)}.admin-logo{text-align:center;font-size:2rem;font-weight:900;margin-bottom:22px}.admin-logo span{color:var(--brand)}.admin-card{background:linear-gradient(145deg,#ffffff12,#ffffff05);border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:0 20px 70px #0006}.admin-card h1{margin-top:0}.message{margin-top:12px;color:var(--brand);min-height:24px}.message.error{color:#ff9999}.table-wrap{overflow:auto}.messages{width:100%;border-collapse:collapse;min-width:680px}.messages td,.messages th{padding:12px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}.messages tr.unread{background:#44e0b20c}.messages tr.read{opacity:.68}.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:.72rem;background:#44e0b222;color:var(--brand)}.actions-cell{white-space:nowrap}.mini{border:1px solid var(--line);background:#ffffff08;color:var(--text);border-radius:8px;padding:6px 9px;cursor:pointer;margin:2px}.mini:hover{border-color:var(--brand)}.mini.delete:hover{border-color:#ff7777;color:#ff9999}.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:18px 0}.stat-box{padding:15px;border:1px solid var(--line);border-radius:14px;background:#ffffff08}.stat-box b{display:block;font-size:1.7rem;color:var(--brand)}.topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.logout{margin-top:20px}@media(max-width:600px){.admin-card{padding:18px}.stats-row{grid-template-columns:1fr 1fr}.stats-row .stat-box:last-child{grid-column:span 2}}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;margin:18px 0}.toolbar input,.toolbar select{flex:1;min-width:170px;background:#07111f;color:var(--text);border:1px solid var(--line);padding:10px;border-radius:9px;font:inherit}.toolbar button{font:inherit}
</style></head><body><div class="admin-wrap"><div class="admin-logo">Rahat<span>.</span> Admin</div><div class="admin-card" id="loginCard"><h1>Admin Login</h1><p class="muted">শুধু website owner-এর জন্য।</p><form id="loginForm" class="form" onsubmit="return false;"><input id="email" type="email" value="rahatbddb@gmail.com" required><input id="password" type="password" placeholder="Password" required><button class="btn" type="submit">Login</button><div id="loginMessage" class="message"></div></form></div><div class="admin-card" id="dashboard" hidden><div class="topbar"><div><div class="eyebrow">PRIVATE AREA</div><h1>Message Dashboard</h1></div><button class="btn alt" id="logout">Logout</button></div><div class="stats-row"><div class="stat-box"><b id="totalCount">0</b>Total messages</div><div class="stat-box"><b id="unreadCount">0</b>Unread</div><div class="stat-box"><b id="readCount">0</b>Read</div></div><div class="toolbar"><input id="searchMessages" placeholder="Search name, email or message..."><select id="statusFilter"><option value="all">All messages</option><option value="unread">Unread</option><option value="read">Read</option></select><button class="mini" id="refreshMessages">↻ Refresh</button><button class="mini" id="exportMessages">↓ Export CSV</button></div><div id="messageList" class="table-wrap"></div><div id="dashboardMessage" class="message"></div></div></div><script>const SUPABASE_URL='https://ygcjyxdhjmjnpoottsbl.supabase.co';const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnY2p5eGRoam1qbnBvb3R0c2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyOTAwMDAsImV4cCI6MjA5OTg2NjAwMH0.pCOwfzHKquClApgfSXCjF8MgwoQfiBc--sfTg3Y2P20';const $=id=>document.getElementById(id);const esc=s=>String(s||'').replace(/[&<>'\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','\"':'&quot;'}[c]));const form=$('loginForm'),loginMsg=$('loginMessage');function error(t){loginMsg.textContent=t;loginMsg.className='message error'}async function start(){if(!window.supabase){error('Supabase load হয়নি। Internet check করে refresh করুন।');return}const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);async function loadMessages(){const {data,error:e}=await db.from('messages').select('*').order('created_at',{ascending:false});if(e){$('messageList').innerHTML='<p class="message error">Messages load হয়নি। SQL policies update করুন।</p>';return}const all=data||[],unread=all.filter(m=>!m.is_read).length;$('totalCount').textContent=all.length;$('unreadCount').textContent=unread;$('readCount').textContent=all.length-unread;$('messageList').innerHTML=all.length?'<table class="messages"><tr><th>Sender</th><th>Subject & message</th><th>Status</th><th>Action</th></tr>'+all.map(m=>'<tr class="'+(m.is_read?'read':'unread')+'"><td><b>'+esc(m.name)+'</b><br>'+esc(m.email)+(m.phone?'<br>'+esc(m.phone):'')+'</td><td><b>'+esc(m.subject)+'</b><br>'+esc(m.message)+'<br><small>'+new Date(m.created_at).toLocaleString()+'</small></td><td><span class="badge">'+(m.is_read?'Read':'Unread')+'</span></td><td class="actions-cell">'+(!m.is_read?'<button class="mini" data-read="'+m.id+'">✓ Read</button>':'')+'<button class="mini delete" data-delete="'+m.id+'">Delete</button></td></tr>').join('')+'</table>':'<p class="muted">কোনো message নেই।</p>';document.querySelectorAll('[data-read]').forEach(b=>b.onclick=async()=>{const {error:e}=await db.from('messages').update({is_read:true}).eq('id',b.dataset.read);if(e)alert('Update policy চালু করুন');else loadMessages()});document.querySelectorAll('[data-delete]').forEach(b=>b.onclick=async()=>{if(!confirm('এই message delete করবেন?'))return;const {error:e}=await db.from('messages').delete().eq('id',b.dataset.delete);if(e)alert('Delete policy চালু করুন');else loadMessages()})}async function dashboard(){ $('loginCard').hidden=true;$('dashboard').hidden=false;await loadMessages()}form.addEventListener('submit',async e=>{e.preventDefault();e.stopPropagation();const b=form.querySelector('button');b.disabled=true;b.textContent='Logging in...';loginMsg.textContent='';try{const {error:e}=await db.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});if(e){error(e.message);b.disabled=false;b.textContent='Login';return}await dashboard()}catch(e){error('Connection error: '+e.message);b.disabled=false;b.textContent='Login'}});$('logout').onclick=async()=>{await db.auth.signOut();location.reload()};const {data}=await db.auth.getSession();if(data.session)dashboard()}const search=$('searchMessages'),filter=$('statusFilter');function applyFilters(){const q=(search.value||'').toLowerCase();document.querySelectorAll('.messages tr:not(:first-child)').forEach(row=>{const matchesText=row.textContent.toLowerCase().includes(q);const matchesStatus=filter.value==='all'||(filter.value==='unread'&&row.classList.contains('unread'))||(filter.value==='read'&&row.classList.contains('read'));row.style.display=matchesText&&matchesStatus?'':'none'})}search.addEventListener('input',applyFilters);filter.addEventListener('change',applyFilters);$('refreshMessages').onclick=()=>location.reload();$('exportMessages').onclick=()=>{const rows=[...document.querySelectorAll('.messages tr')].map(r=>[...r.children].slice(0,3).map(c=>'"'+c.innerText.replace(/"/g,'""')+'"').join(','));if(rows.length<2)return;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.join('\\n')],{type:'text/csv'}));a.download='rahat-messages.csv';a.click()};start();</script></body></html>
