<!doctype html><html lang="bn"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Admin Login | Rahat Ahmed</title><link rel="stylesheet" href="styles.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><style>body{min-height:100vh;display:grid;place-items:center}.admin-wrap{width:min(520px,92%)}.admin-logo{text-align:center;font-size:2rem;font-weight:900;margin-bottom:22px}.admin-logo span{color:var(--brand)}.admin-card{background:linear-gradient(145deg,#ffffff12,#ffffff05);border:1px solid var(--line);border-radius:22px;padding:28px;box-shadow:0 20px 70px #0006}.admin-card h1{margin-top:0}.message{margin-top:12px;color:var(--brand);min-height:24px}.message.error{color:#ff9999}.table-wrap{overflow:auto}.messages{width:100%;border-collapse:collapse}.messages td,.messages th{padding:10px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}.logout{margin-top:20px}</style></head><body><div class="admin-wrap"><div class="admin-logo">Rahat<span>.</span> Admin</div><div class="admin-card" id="loginCard"><h1>Admin Login</h1><p class="muted">শুধু website owner-এর জন্য।</p><form id="loginForm" class="form" onsubmit="return false;"><input id="email" type="email" value="rahatbddb@gmail.com" required><input id="password" type="password" placeholder="Password" required><button class="btn" type="submit">Login</button><div id="loginMessage" class="message"></div></form></div><div class="admin-card" id="dashboard" hidden><h1>Messages</h1><div id="messageList" class="table-wrap"></div><button class="btn alt logout" id="logout">Logout</button></div></div><script>const SUPABASE_URL='https://ygcjyxdhjmjnpoottsbl.supabase.co';const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlnY2p5eGRoam1qbnBvb3R0c2JsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyOTAwMDAsImV4cCI6MjA5OTg2NjAwMH0.pCOwfzHKquClApgfSXCjF8MgwoQfiBc--sfTg3Y2P20';const $=id=>document.getElementById(id);const esc=s=>String(s||'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));const form=$('loginForm');const msg=$('loginMessage');function showError(text){msg.textContent=text;msg.className='message error'}async function start(){if(!window.supabase){showError('Supabase connection load হয়নি। Browser refresh করে আবার চেষ্টা করুন।');return}const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);async function loadMessages(){const {data,error}=await db.from('messages').select('*').order('created_at',{ascending:false});if(error){$('messageList').innerHTML='<p class="message error">Messages load হয়নি। SQL table ও permission check করুন।</p>';return}$('messageList').innerHTML=data.length?'<table class="messages"><tr><th>Name</th><th>Message</th></tr>'+data.map(m=>'<tr><td><b>'+esc(m.name)+'</b><br>'+esc(m.email)+'</td><td>'+esc(m.message)+'<br><small>'+esc(m.subject)+'</small></td></tr>').join('')+'</table>':'<p class="muted">কোনো message নেই।</p>'}async function showDashboard(){ $('loginCard').hidden=true;$('dashboard').hidden=false;await loadMessages()}form.addEventListener('submit',async e=>{e.preventDefault();e.stopPropagation();const b=form.querySelector('button');b.disabled=true;b.textContent='Logging in...';msg.textContent='';try{const {error}=await db.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});if(error){showError(error.message);b.disabled=false;b.textContent='Login';return}await showDashboard()}catch(err){showError('Connection error: '+err.message);b.disabled=false;b.textContent='Login'}});$('logout').onclick=async()=>{await db.auth.signOut();location.reload()};const {data}=await db.auth.getSession();if(data.session)showDashboard()}start();</script></body></html>
